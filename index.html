<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chunchun — Full-Stack Developer & Software Engineer crafting premium digital experiences." />
    <meta name="theme-color" content="#020817" />

    <!-- Google Fonts: Inter + Cinzel (decorative serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <title>Chunchun — Full-Stack Developer</title>
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: black; padding: 10px;"></div>
    <script>
      window.addEventListener('error', function(event) {
        document.getElementById('error-log').innerText += event.message + '\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').innerText += event.reason + '\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
